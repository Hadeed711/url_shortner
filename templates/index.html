<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <style>
    body { font-family: sans-serif; max-width: 520px; margin: 80px auto; padding: 0 20px; }
    input[type="text"] { width: 100%; padding: 10px; font-size: 15px; box-sizing: border-box; }
    button { margin-top: 10px; padding: 10px 24px; font-size: 15px; cursor: pointer; }
    #result { margin-top: 20px; font-size: 15px; }
    a { color: #0066cc; }
  </style>
</head>
<body>
  <h1>URL Shortener</h1>

  <input type="text" id="url-input" placeholder="https://example.com/very/long/url">
  <button onclick="shorten()">Shorten</button>

  <div id="result"></div>

  <script>
    async function shorten() {
      const url = document.getElementById('url-input').value;
      const res = await fetch('/shorten', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const data = await res.json();
      if (data.short_url) {
        document.getElementById('result').innerHTML =
          'Short URL: <a href="' + data.short_url + '">' + data.short_url + '</a>';
      } else {
        document.getElementById('result').textContent = 'Error: ' + data.error;
      }
    }
  </script>
</body>
</html>
