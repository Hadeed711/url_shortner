name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # STEP 6 — Redis as a service container
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install redis-cli (redis-tools)
        run: sudo apt-get update && sudo apt-get install -y redis-tools

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Redis is running        # optional debug step
        run: redis-cli -h localhost -p 6379 ping

      # STEP 7 — Lint with flake8
      - name: Lint with flake8
        run: flake8 app.py shortener.py config.py

      # STEP 8 — Run all tests
      - name: Run pytest
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          BASE_URL: http://localhost:5000
        run: pytest -v --tb=short